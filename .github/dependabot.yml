version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "build"
    groups:
      github-actions-all:
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "build"
    groups:
      backend-all:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/UI"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "ui"
    commit-message:
      prefix: "build"
    groups:
      ui-all:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/Android"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "android"
    commit-message:
      prefix: "build"
    groups:
      android-all:
        patterns:
          - "*"
