name: Dependabot Manual Trigger

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action on open Dependabot PRs"
        required: true
        default: "recreate"
        type: choice
        options:
          - recreate
          - rebase

permissions:
  pull-requests: write
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on open Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ACTION: ${{ inputs.action }}
        run: |
          set -e
          prs=$(gh pr list --repo "$REPO" --author "app/dependabot" --state open --json number --jq '.[].number')
          if [ -z "$prs" ]; then
            echo "No open Dependabot PRs. For a fresh scan, use:"
            echo "  Repo -> Insights -> Dependency graph -> Dependabot -> Check for updates"
            exit 0
          fi
          for pr in $prs; do
            echo "Commenting @dependabot $ACTION on PR #$pr"
            gh pr comment "$pr" --repo "$REPO" --body "@dependabot $ACTION"
          done
